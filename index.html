<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat UI</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar" aria-label="Conversations sidebar">
        <button class="new-chat-btn" type="button">+ New Chat</button>

        <nav class="conversation-list" aria-label="Conversation list">
          <button class="conversation-item conversation-item--active" type="button">
            <div class="conversation-title">Project Help</div>
            <div class="conversation-preview">Project Setup</div>
          </button>

          <button class="conversation-item" type="button">
            <div class="conversation-title">Random Ideas</div>
            <div class="conversation-preview">UI layout brainstorm…</div>
          </button>

          <button class="conversation-item" type="button">
            <div class="conversation-title">Study Notes</div>
            <div class="conversation-preview">Algorithms recap…</div>
          </button>
        </nav>
      </aside>

      <main class="chat" aria-label="Chat area">
        <header class="chat-header">
          <div class="chat-header__title">Project Help</div>
          <div class="chat-header__subtitle">Static UI • No backend</div>
        </header>

        <section id="messages" class="messages" aria-label="Message list"></section>

        <form id="composer" class="composer" aria-label="Message composer">
          <textarea
            id="messageInput"
            class="composer__input"
            placeholder="Write a message…"
            aria-label="Message input"
            rows="2"
          ></textarea>
          <button class="composer__send" type="submit">Send</button>
        </form>
      </main>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
