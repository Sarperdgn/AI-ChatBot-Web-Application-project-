<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Static Chat UI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1 class="title">Chat</h1>
        <p class="subtitle">Static UI</p>
      </header>

      <section id="messages" class="messages" aria-label="Message list">
        <div class="bubble bubble--system">
          <div class="bubble__meta">System</div>
          <div class="bubble__text">Type a message and press Send.</div>
        </div>
      </section>

      <form id="composer" class="composer" autocomplete="off">
        <input
          id="messageInput"
          class="composer__input"
          type="text"
          placeholder="Write a message…"
          aria-label="Message input"
          required
        />
        <button id="sendBtn" class="composer__send" type="submit">Send</button>
      </form>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
